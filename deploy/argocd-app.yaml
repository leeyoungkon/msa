apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: msa
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/leeyoungkon/msa.git
    targetRevision: main
    path: deploy/base
  destination:
    server: https://kubernetes.default.svc
    namespace: msa
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true